name: Create Release Package

on:
  push:
    tags:
      - 'v*.*.*'

# The default GITHUB_TOKEN is read-only; creating the release and
# uploading assets requires contents write.
permissions:
  contents: write

jobs:
  build-release:
    name: Build and Package Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          # composer.json requires ^8.2 — build the package with the app's
          # minimum supported PHP so the optimized autoloader stays compatible.
          php-version: '8.2'
          extensions: pdo, pdo_mysql, pdo_sqlite, mbstring, json, openssl, curl, gd, exif
          tools: composer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq rsync zip unzip

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Verify version.json matches tag
        run: |
          VERSION_JSON=$(jq -r '.version' version.json)
          if [ "$VERSION_JSON" != "${{ steps.version.outputs.VERSION }}" ]; then
            echo "❌ Version mismatch: version.json ($VERSION_JSON) != tag (${{ steps.version.outputs.VERSION }})"
            exit 1
          fi
          echo "✅ Version verified: $VERSION_JSON"

      - name: Make build script executable
        run: chmod +x bin/build-release.sh

      - name: Create release package
        run: ./bin/build-release.sh --skip-build

      - name: Verify package files exist
        run: |
          if [ ! -f "releases/cimaise-v${{ steps.version.outputs.VERSION }}.zip" ]; then
            echo "❌ Release ZIP not found"
            exit 1
          fi
          if [ ! -f "releases/cimaise-v${{ steps.version.outputs.VERSION }}.zip.sha256" ]; then
            echo "❌ Checksum file not found"
            exit 1
          fi
          if [ ! -f "releases/RELEASE_NOTES-v${{ steps.version.outputs.VERSION }}.md" ]; then
            echo "❌ Release notes not found"
            exit 1
          fi
          echo "✅ All package files verified"

      - name: Extract changelog for this version
        id: changelog
        run: |
          if [ -f "CHANGELOG.md" ]; then
            # Extract changelog section for this version
            VERSION_SECTION=$(awk "/## \[${VERSION}\]/{flag=1;next}/## \[/{flag=0}flag" CHANGELOG.md || echo "See CHANGELOG.md for details")
            {
              echo "CHANGELOG<<EOF"
              echo "$VERSION_SECTION"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "CHANGELOG=See release notes for details" >> "$GITHUB_OUTPUT"
          fi
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}

      # Optional per-release migration patches. If release-patches/ carries a
      # pre-update-patch.php / post-install-patch.php for this release, sign
      # each with the same Ed25519 key used for plugins and stage it (+ .sig)
      # as release assets. The updater verifies the signature before executing
      # — an unsigned or absent patch is simply not run (fail-closed).
      - name: Sign release patches (optional)
        env:
          PLUGIN_SIGNING_KEY: ${{ secrets.PLUGIN_SIGNING_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${PLUGIN_SIGNING_KEY:-}" ]; then
            echo "No signing key configured — skipping patch signing."
            exit 0
          fi
          for name in pre-update-patch.php post-install-patch.php; do
            src="release-patches/${name}"
            if [ -f "$src" ]; then
              cp "$src" "releases/${name}"
              php bin/console plugin:sign "releases/${name}" --out "releases/${name}.sig"
              echo "Signed ${name}"
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Cimaise v${{ steps.version.outputs.VERSION }}
          body: |
            # Cimaise v${{ steps.version.outputs.VERSION }}

            ${{ steps.changelog.outputs.CHANGELOG }}

            ---

            ## 📦 Download

            Download `cimaise-v${{ steps.version.outputs.VERSION }}.zip` and verify checksum:

            ```bash
            shasum -a 256 -c cimaise-v${{ steps.version.outputs.VERSION }}.zip.sha256
            ```

            ## 📋 Installation

            1. Extract archive:
               ```bash
               unzip cimaise-v${{ steps.version.outputs.VERSION }}.zip
               cd cimaise-v${{ steps.version.outputs.VERSION }}
               ```

            2. Configure environment:
               ```bash
               cp .env.example .env
               # Edit .env with your settings
               ```

            3. Run web installer at: http://yourdomain.com

            4. *(Optional)* Refresh Composer dependencies if customizing:
               ```bash
               composer install --no-dev --optimize-autoloader
               ```

            See README.md in the package for complete documentation.
          files: |
            releases/cimaise-v${{ steps.version.outputs.VERSION }}.zip
            releases/cimaise-v${{ steps.version.outputs.VERSION }}.zip.sha256
            releases/RELEASE_NOTES-v${{ steps.version.outputs.VERSION }}.md
            releases/pre-update-patch.php
            releases/pre-update-patch.php.sig
            releases/post-install-patch.php
            releases/post-install-patch.php.sig
          # The patch assets are optional (present only when this release ships
          # a migration patch); don't fail the release when they're absent.
          fail_on_unmatched_files: false
          draft: false
          # Pinakes rule: hyphenated versions (1.5.0-rc.1) are prereleases, so
          # /releases/latest never resolves to them and stable installs are safe.
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Pinakes "absolute rule" adapted to Actions: NEVER trust that the upload
      # worked. Verify the published asset via the GitHub API (metadata + binary
      # re-download) against the locally built package, and fail loudly otherwise.
      - name: Verify uploaded release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          set -euo pipefail
          ASSET_NAME="cimaise-v${VERSION}.zip"
          LOCAL_FILE="releases/${ASSET_NAME}"

          LOCAL_SHA=$(sha256sum "$LOCAL_FILE" | awk '{print $1}')
          LOCAL_SIZE=$(stat -c%s "$LOCAL_FILE")
          echo "Local package: ${LOCAL_SIZE} bytes, sha256=${LOCAL_SHA}"

          # 1) Release metadata via API (authoritative answer, no CDN).
          #    Retry a few times: asset processing can lag right after upload.
          RELEASE_JSON=""
          for attempt in 1 2 3 4 5; do
            if RELEASE_JSON=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/v${VERSION}"); then
              break
            fi
            echo "Attempt ${attempt}: release not available yet, retrying in 10s..."
            sleep 10
          done
          if [ -z "$RELEASE_JSON" ]; then
            echo "::error::Cannot fetch release v${VERSION} via API"
            exit 1
          fi

          ASSET_JSON=$(echo "$RELEASE_JSON" | jq --arg n "$ASSET_NAME" '[.assets[] | select(.name == $n)] | first // empty')
          if [ -z "$ASSET_JSON" ]; then
            echo "::error::Release v${VERSION} has NO ${ASSET_NAME} asset - the upload failed. Installs would have nothing to download."
            exit 1
          fi

          REMOTE_SIZE=$(echo "$ASSET_JSON" | jq -r '.size')
          REMOTE_DIGEST=$(echo "$ASSET_JSON" | jq -r '.digest // empty')
          ASSET_ID=$(echo "$ASSET_JSON" | jq -r '.id')
          echo "Remote asset: id=${ASSET_ID}, ${REMOTE_SIZE} bytes, digest=${REMOTE_DIGEST:-<none>}"

          if [ "$REMOTE_SIZE" != "$LOCAL_SIZE" ]; then
            echo "::error::Uploaded asset size (${REMOTE_SIZE}) != local package size (${LOCAL_SIZE}) - truncated upload"
            exit 1
          fi

          if [ -n "$REMOTE_DIGEST" ] && [ "$REMOTE_DIGEST" != "sha256:${LOCAL_SHA}" ]; then
            echo "::error::Uploaded asset digest (${REMOTE_DIGEST}) != local sha256:${LOCAL_SHA}"
            exit 1
          fi

          # 2) Re-download the binary via the API and compare checksums.
          gh api -H "Accept: application/octet-stream" \
            "repos/${GITHUB_REPOSITORY}/releases/assets/${ASSET_ID}" > /tmp/asset-redownload.zip
          DL_SHA=$(sha256sum /tmp/asset-redownload.zip | awk '{print $1}')
          if [ "$DL_SHA" != "$LOCAL_SHA" ]; then
            echo "::error::Re-downloaded asset sha256 (${DL_SHA}) != local sha256 (${LOCAL_SHA})"
            exit 1
          fi

          # 3) The .sha256 sidecar must also be present (runtime fallback integrity source).
          if ! echo "$RELEASE_JSON" | jq -e --arg n "${ASSET_NAME}.sha256" '.assets[] | select(.name == $n)' > /dev/null; then
            echo "::error::Release is missing the ${ASSET_NAME}.sha256 sidecar asset"
            exit 1
          fi

          echo "Uploaded asset verified: name, size, digest and binary checksum all match."

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-package-v${{ steps.version.outputs.VERSION }}
          path: |
            releases/cimaise-v${{ steps.version.outputs.VERSION }}.zip
            releases/cimaise-v${{ steps.version.outputs.VERSION }}.zip.sha256
            releases/RELEASE_NOTES-v${{ steps.version.outputs.VERSION }}.md
          retention-days: 90
