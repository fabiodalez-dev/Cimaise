# ───────────────────────────────────────────────────────────────────────────
# Cimaise — Apache virtual host (container image)
#
# DocumentRoot is public/ so only the web entrypoint is reachable. AllowOverride
# All keeps the project's .htaccess fully in effect inside the container exactly
# like on shared hosting (rewrite to index.php, security headers, dotfile and
# traversal blocks, header de-duplication) — this is the project's expected
# runtime contract.
# ───────────────────────────────────────────────────────────────────────────
<VirtualHost *:80>
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    # Never serve the application code, storage or database directory.
    <DirectoryMatch "^/var/www/html/(app|storage|database|vendor|bin|resources|scripts|tests)">
        Require all denied
    </DirectoryMatch>

    # Forward the real client IP / scheme when running behind a reverse proxy
    # (set TRUSTED_PROXIES in the environment for the app to honour it).
    SetEnvIf X-Forwarded-Proto "https" HTTPS=on

    ErrorLog  /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
