; ───────────────────────────────────────────────────────────────────────────
; Cimaise — production PHP configuration (container image)
;
; Mirrors the project's php.ini but with production-safe error handling:
; display_errors is OFF here. Echoing PHP warnings into the output stream
; corrupts binary media responses (a leading "<br>Deprecated …" makes an
; image undecodable), so it must never be on in the served image.
; ───────────────────────────────────────────────────────────────────────────

; Uploads — large photo files
upload_max_filesize = 64M
post_max_size = 64M
max_file_uploads = 50
max_execution_time = 600
max_input_time = 600
memory_limit = 512M

; Errors — production: log, never display
display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Opcache — performance
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 60
opcache.validate_timestamps = 1
opcache.fast_shutdown = 1

; Sessions
session.gc_maxlifetime = 7200
session.cookie_lifetime = 0
session.cookie_httponly = 1
session.cookie_samesite = "Lax"

; Misc
default_charset = "UTF-8"
expose_php = Off
